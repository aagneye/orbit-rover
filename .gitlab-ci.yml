stages:
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

backend:test:
  stage: test
  image: python:3.12-slim
  before_script:
    - cd orbit-rover/backend
    - pip install -r requirements.txt -r requirements-dev.txt
  script:
    - pytest tests/ -v
  cache:
    paths:
      - .cache/pip

frontend:lint:
  stage: test
  image: node:20-alpine
  before_script:
    - cd orbit-rover/frontend
    - npm install
  script:
    - npm run build
  cache:
    paths:
      - orbit-rover/frontend/node_modules/

docker:build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - cd orbit-rover
    - docker compose build
  only:
    - main
    - master
