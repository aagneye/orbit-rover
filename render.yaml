# Optional — Render may require a credit card. Prefer Railway or Fly.io (see docs/LIVE_SETUP.md).
services:
  - type: web
    name: orbit-rover-api
    runtime: python
    rootDir: orbit-rover/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: AUTH_ENABLED
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: LLM_PROVIDER
        value: mock
      - key: ORBIT_USE_MOCK
        value: "true"
      - key: POST_MR_COMMENT
        value: "true"
