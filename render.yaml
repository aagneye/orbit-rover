# Orbit Rover — Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → connect this repo
# Guide: docs/LIVE_SETUP.md

services:
  - type: web
    name: orbit-rover-api
    runtime: python
    plan: free
    rootDir: orbit-rover/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: AUTH_ENABLED
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: LLM_PROVIDER
        value: mock
      - key: ORBIT_USE_MOCK
        value: "true"
      - key: POST_MR_COMMENT
        value: "true"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/orbit_rover.db
      - key: RENDER
        value: "true"
      - key: PUBLIC_API_URL
        value: "https://orbit-rover-api.onrender.com"
      - key: DASHBOARD_BASE_URL
        value: "https://orbit-rover.vercel.app"
      - key: CORS_ORIGINS
        value: "https://orbit-rover.vercel.app"
      - key: GITLAB_OAUTH_REDIRECT_URI
        value: "https://orbit-rover-api.onrender.com/auth/gitlab/callback"
      # Set in Render dashboard (secrets): GITLAB_TOKEN, GITLAB_OAUTH_CLIENT_ID,
      # GITLAB_OAUTH_CLIENT_SECRET, GITLAB_WEBHOOK_SECRET, SESSION_SECRET
